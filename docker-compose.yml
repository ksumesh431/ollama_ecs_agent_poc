services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    network_mode: host
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  custom-mcp:
    build:
      context: ./custom-mcp-server
    container_name: custom-mcp
    restart: unless-stopped
    network_mode: host
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  ollama-models:
    external: true
